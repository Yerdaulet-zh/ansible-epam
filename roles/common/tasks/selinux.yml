---
- name: Disable SELinux
  selinux:
    state: disabled
  register: selinux_status
  when: disable_selinux_control | bool

- name: Notify reboot if SELinux was changed
  debug:
    msg: "SELinux state changed, triggering reboot..."
  changed_when: selinux_status.changed
  notify: reboot_node
  when: disable_selinux_control | bool
